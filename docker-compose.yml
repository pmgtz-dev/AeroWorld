services:
  aeroworld:
    build:
      context: .
      dockerfile: apps/aeroworld/Dockerfile
    container_name: aeroworld
    #ports:
    #  - "${CLI_PORT}:${CLI_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${CLI_PORT}
      - DOTENV_CONFIG_PATH=/app/.env
    expose:
      - "${CLI_PORT}" 

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: server
    #ports:
    #  - "${API_PORT}:${API_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${API_PORT}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    expose:
      - "${API_PORT}"

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - CLI_PORT=${CLI_PORT}
      - API_PORT=${API_PORT}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - aeroworld
      - server
      
  db:
    image: postgres:15
    container_name: postgres
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  postgres_data: